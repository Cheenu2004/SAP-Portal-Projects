name: maintenance_proj
description: "Maintenance Portal - SAP OData Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP / OData Integration
  dio: ^5.7.0

  # Local Storage / Session Management
  shared_preferences: ^2.3.4

  # UI Enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Date/Time Formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
